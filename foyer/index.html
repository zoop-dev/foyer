<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Made with Foyer</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/foyer/foyer-mark.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/fonts/fonts.css" />
  <style>
    :root{--bg:#0b0e13;--ink:#e8edf2;--muted:#8b94a6;--accent:#7fa6d8}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--ink);font-family:'Josefin Sans',system-ui,sans-serif;font-weight:200;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased;overflow:hidden}
    .glow{position:fixed;inset:-30% -10% auto;height:70vh;background:radial-gradient(ellipse 50% 60% at 50% 0%,rgba(127,166,216,.10),transparent 70%);pointer-events:none}
    .wrap{position:relative;max-width:420px}
    .mark{width:60px;height:auto;margin:0 auto 1.8rem;display:block;animation:breathe 5s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.8;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    .eyebrow{font-size:.56rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);margin-bottom:1.4rem;font-weight:300}
    h1{font-family:'Unbounded',sans-serif;font-weight:200;font-size:1.5rem;letter-spacing:.01em;line-height:1.3;margin-bottom:.7rem}
    h1 b{color:var(--accent);font-weight:300}
    p{color:rgba(232,237,242,.62);font-size:.9rem;line-height:1.85;margin-bottom:2.2rem}
    .btns{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}
    a{text-decoration:none}
    .btn{display:inline-flex;align-items:center;gap:.5rem;font-weight:300;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;padding:.8rem 1.6rem;border-radius:10px;border:1px solid rgba(170,190,215,.2);color:rgba(232,237,242,.82);text-decoration:none;transition:all .2s}
    .btn:hover{border-color:var(--accent);color:#fff}
    .btn.primary{background:var(--accent);color:#070a0e;border-color:var(--accent)}
    .btn.primary:hover{filter:brightness(1.08);color:#070a0e}
    .foot{margin-top:2.4rem;font-size:.55rem;letter-spacing:.12em;color:rgba(139,148,166,.5)}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 44 50" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 46 V24 a16 16 0 0 1 32 0 V46"/><path d="M15 46 V28 a6 6 0 0 1 12 0 V46"/></svg>
    <p class="eyebrow">Made with Foyer</p>
    <h1><b>{{NAME}}</b> runs on Foyer</h1>
    <p>Foyer is the platform this site is built on. A few other sites run on the same thing, and one Foyer login gets you into all of them.</p>
    <div class="btns">
      <a class="btn primary" href="https://foyer.zo0p.dev">Visit Foyer</a>
      <a class="btn" href="/">← Back to {{NAME}}</a>
    </div>
    <p class="foot">FOYER · foyer.zo0p.dev</p>
  </div>
  <script>try{console.log('%c ∩ foyer %c this site runs on the foyer website architecture · v{{VERSION}}','background:linear-gradient(135deg,#eef1f5,#a9b1bd);color:#11151b;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.05em','color:#8b94a6;font-style:italic;padding-left:6px');}catch(e){}</script>
</body>
</html>
